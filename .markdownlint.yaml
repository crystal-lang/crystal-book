default: true

no-inline-html: false
line-length: false

ol-prefix:
  style: "ordered"
ul-style:
  style: "asterisk"
ul-indent:
  indent: 4 # Python-Markdown requires 4 indent

emphasis-style:
  style: "asterisk"
strong-style:
  style: "asterisk"

no-duplicate-heading:
  siblings_only: true
no-bare-urls: false

fenced-code-language: false
commands-show-output: false

table-column-style:
  aligned_delimiter: true
